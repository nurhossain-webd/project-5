<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Home Page</title>

    <!-- daisyUI and Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!--   font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>

<body>
    <nav class="mx-4">
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <div class="flex items-center gap-1">
                    <img src="assets/github-logo.png" alt="GitHub" class="h-6 w-6 object-contain block" />
                    <p>GitHub Issues Tracker</p>
                </div>

            </div>
            <div class="flex ">
                <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                <div class="navbar-end">
                    <a class="btn btn-primary">+ New Issue</a>
                </div>

            </div>
        </div>
    </nav>

    <main class="w-11/12 mx-auto mt-5">
        <!-- Main page upper 3 btn -->
        <div class="flex gap-3 ">
            <button id="allBtn" class="btn  btn-primary">All</button>
            <button id="openBtn" class="btn btn-soft">Open</button>
            <button id="closedBtn" class="btn btn-soft">Closed</button>
        </div>

        <!-- load spinning  -->
        <div id="loadSpinner" class="h-[40vh] flex hidden justify-center items-center">
            <span class="loading loading-spinner loading-xl"></span>
        </div>

        <!-- Issues count section -->
        <div class="mt-7 flex justify-between">
            <div class="flex items-center gap-2">
                <img src="assets/Aperture.png" alt="">
                <div>
                    <h3 class="text-lg"><span id="totalIssues">0 </span> Issues</h3>
                    <p class="text-black/60 text-sm">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-2">
                <p><i class="fa-solid fa-circle text-green-500"></i> Open</p>
                <p><i class="fa-solid fa-circle text-violet-500"></i> Closed</p>
            </div>
        </div>

        <!-- Card container -->
        <div id="issuesContainer" class="grid grid-cols-4 gap-2 mt-10">


        </div>

    </main>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="Issue_details_modal" class="modal modal-bottom sm:modal-middle">

    </dialog>

    <!-- loading spinner -->




    <script src="script.js"></script>
</body>

</html>
